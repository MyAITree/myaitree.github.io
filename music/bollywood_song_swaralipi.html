
<style>
*{box-sizing:border-box;margin:0;padding:0;}
.pg{padding:1rem 0 2rem;}
.top-bar{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap;}
.top-bar h1{font-size:20px;font-weight:500;color:var(--color-text-primary);flex:1;}
select{font-size:13px;padding:5px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;}
.song-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem;}
.song-card.active{border-color:var(--color-border-primary);}
.song-head{display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer;gap:8px;}
.song-title{font-size:15px;font-weight:500;color:var(--color-text-primary);}
.song-sub{font-size:12px;color:var(--color-text-secondary);margin-top:3px;}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px;white-space:nowrap;}
.b-purple{background:#EEEDFE;color:#3C3489;}
.b-teal{background:#E1F5EE;color:#085041;}
.b-coral{background:#FAECE7;color:#712B13;}
.b-amber{background:#FAEEDA;color:#633806;}
.b-green{background:#EAF3DE;color:#27500A;}
.b-pink{background:#FBEAF0;color:#72243E;}
.chevron{font-size:18px;color:var(--color-text-tertiary);transition:transform 0.2s;flex-shrink:0;margin-top:2px;}
.chevron.open{transform:rotate(180deg);}
.body{display:none;margin-top:14px;border-top:0.5px solid var(--color-border-tertiary);padding-top:14px;}
.legend-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px;}
.leg{font-size:11px;color:var(--color-text-secondary);}
.leg span{font-weight:500;}
.section-label{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;margin-top:12px;}
.section-label:first-child{margin-top:0;}
.notation-block{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 14px;font-family:var(--font-mono);font-size:13px;line-height:2.2;color:var(--color-text-primary);word-break:break-word;}
.n{display:inline-block;padding:1px 5px;border-radius:4px;margin:1px 2px;cursor:default;transition:background 0.1s;}
.n:hover{background:var(--color-background-info);color:var(--color-text-info);}
.n.s{color:var(--color-text-primary);}
.n.k{color:#A32D2D;}
.n.t{color:#185FA5;font-style:italic;}
.n.hi{font-size:11px;vertical-align:super;}
.n.lo{font-size:11px;vertical-align:sub;}
.n.dash{color:var(--color-text-tertiary);}
.n.sep{color:var(--color-border-secondary);margin:0 6px;}
.tip{margin-top:12px;font-size:12px;color:var(--color-text-secondary);line-height:1.6;padding:8px 12px;border-left:2px solid var(--color-border-secondary);border-radius:0;}
.play-row{display:flex;align-items:center;gap:8px;margin-top:12px;}
.play-btn{font-size:12px;padding:5px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;}
.play-btn:hover{background:var(--color-background-secondary);}
.ask-btn{font-size:12px;padding:5px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-info);cursor:pointer;}
.key-map{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:10px;}
.key{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:4px;padding:5px 2px;text-align:center;font-size:11px;}
.key .sw{font-weight:500;color:var(--color-text-primary);font-size:13px;}
.key .hn{color:var(--color-text-secondary);}
.key.komal .sw{color:#A32D2D;}
</style>

  <strong style="color:var(--color-text-primary);font-weight:500;">Reading the notation</strong> —

  <span style="color:#A32D2D;font-weight:500;">Red = komal (flat)</span> &nbsp;|&nbsp;

  <sub style="font-size:10px;">dot below</sub> = lower octave (mandra) &nbsp;|&nbsp;

</div>
</div>

function renderNote(n){
  let cls="n ";
  if(n.t==="k") cls+="k ";
  else if(n.t==="t") cls+="t ";
  else if(n.t==="dash") cls+="dash ";
  else if(n.t==="sep") cls+="sep ";
  else cls+="s ";
  if(n.hi) cls+="hi ";
  if(n.lo) cls+="lo ";
  return `<span class="${cls.trim()}">${n.n}</span>`;
}

function renderCards(filter){
  const data=filter==="all"?songs:songs.filter(s=>s.raga===filter);
  document.getElementById("cards").innerHTML=data.map((s,i)=>`
    <div class="song-card" id="sc${i}">
      <div class="song-head" onclick="toggleCard(${i})">
        <div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <span class="song-title">${s.title}</span>
            <span class="badge ${s.badge}">${s.raga}</span>
          </div>
          <div class="song-sub">${s.film}</div>
        </div>
        <span class="chevron" id="ch${i}">↓</span>
      </div>
      <div class="body" id="bd${i}">
        ${s.sections.map(sec=>`
          <div class="section-label">${sec.label}</div>
          <div class="notation-block">${sec.notes.map(renderNote).join("")}</div>
        `).join("")}
        <div class="tip">${s.tip}</div>
        <div class="play-row">
          <button class="ask-btn" onclick="sendPrompt('Teach me how to sing ${s.title} in Raga ${s.raga} step by step ↗')">Sing step by step ↗</button>
          <button class="ask-btn" onclick="sendPrompt('Show harmonium/keyboard fingering for ${s.title} ↗')">Harmonium fingering ↗</button>
        </div>
      </div>
    </div>
  `).join("");
}

  const open=bd.style.display==="block";
  bd.style.display=open?"none":"block";
  ch.textContent=open?"↓":"↑";
  ch.classList.toggle("open",!open);
  card.classList.toggle("active",!open);
}

function filterBySong(){
  const v=document.getElementById("ragaFilter").value;

}
